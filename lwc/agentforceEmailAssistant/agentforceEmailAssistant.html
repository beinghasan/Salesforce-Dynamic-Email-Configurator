<template>
    <div class="slds-box slds-theme_shade slds-m-bottom_medium">
        <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_x-small">
            <lightning-icon icon-name="standard:bot" size="small" class="slds-m-right_x-small"></lightning-icon>
            <span class="slds-text-title_bold">Agentforce Smart Copywriter Assistant</span>
        </div>
        
        <lightning-textarea 
            label="What is the goal of this email template?"
            placeholder="e.g., Write a polite escalation alert to a premium client letting them know we are prioritizing their high priority case. Keep the tone empathetic and formal."
            value={aiPromptInput}
            onchange={handleAiPromptChange}
            rows="2"
            disabled={isAiComponentDisabled}>
        </lightning-textarea>

        <div class="slds-text-align_right slds-m-top_small">
            <lightning-button 
                label="Generate with Agentforce" 
                variant="brand" 
                icon-name="utility:einstein"
                onclick={executeAiDrafting}
                disabled={isAiComponentDisabled}>
            </lightning-button>
        </div>
    </div>
</template>
